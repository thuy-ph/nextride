<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#10162B" />
    <meta name="description" content="NextRide finds the smartest next move for your family at the park." />
    <link rel="stylesheet" href="./styles.css?v=7" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <title>NextRide — your best move in the park</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <a class="brand" href="./" aria-label="NextRide home">NextRide<span class="brand-dot">.</span></a>
        <button class="family-button" id="party-button" type="button" aria-label="Edit your family profile">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 20v-1.2a4.8 4.8 0 0 0-4.8-4.8H6.8A4.8 4.8 0 0 0 2 18.8V20M9 10a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm10.5 10v-1.2a4.8 4.8 0 0 0-3.6-4.64M15 2.14a4 4 0 0 1 0 7.72" /></svg>
          <span>Family</span>
        </button>
      </header>

      <main id="app">
        <section class="loading-state" aria-label="Loading your best next move">
          <div class="skeleton skeleton-status"></div>
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-ride"></div>
          <div class="skeleton skeleton-button"></div>
        </section>
      </main>
    </div>

    <dialog class="sheet" id="party-sheet" aria-labelledby="party-sheet-title">
      <form method="dialog" class="sheet-content" id="party-form">
        <div class="sheet-heading">
          <h2 id="party-sheet-title">Your family</h2>
          <button class="close-button" type="button" data-close-sheet aria-label="Close family profile">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18" /></svg>
          </button>
        </div>
        <p class="sheet-intro">Heights help NextRide choose rides your group can do together. Always confirm official ride rules at the attraction.</p>
        <label class="field-label" for="adult-count">Adults</label>
        <input class="number-input" id="adult-count" name="adults" type="number" min="1" max="8" inputmode="numeric" value="2" />
        <label class="field-label" for="child-heights">Child heights in cm</label>
        <input class="text-input" id="child-heights" name="childHeights" type="text" inputmode="text" autocomplete="off" placeholder="e.g. 118, 96" value="118, 96" />
        <label class="toggle-row" for="parent-swap">
          <span><strong>Use Parent Swap options</strong><small>Include eligible adult rides where the park supports swapping.</small></span>
          <input id="parent-swap" name="parentSwap" type="checkbox" />
        </label>
        <div class="sheet-actions">
          <button class="button secondary-button" id="reset-day" type="button">Reset today</button>
          <button class="button primary-button" type="submit">Update plan</button>
        </div>
      </form>
    </dialog>

    <p class="sr-only" id="plan-status" role="status" aria-live="polite"></p>
    <div class="toast" id="toast" role="status"></div>
    <script type="module" src="./app.js?v=10"></script>
  </body>
</html>
